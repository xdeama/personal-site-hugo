{{- /*
Theme switcher styled like the language switcher: a glyph plus both
options, the active one muted. Wired by dark-mode-toggle.js.
*/ -}}
<span class="theme-links" role="group" aria-label="{{ T "themeToggle" }}">
    <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 3a9 9 0 0 1 0 18Z" fill="currentColor"/></svg>
    <button type="button" class="theme-option" data-theme="light" aria-pressed="false">{{ T "themeLight" }}</button>
    <span class="lang-sep" aria-hidden="true">|</span>
    <button type="button" class="theme-option" data-theme="dark" aria-pressed="false">{{ T "themeDark" }}</button>
</span>
