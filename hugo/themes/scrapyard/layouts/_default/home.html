{{ define "main" }}
    <article class="wrapper region prose flow">
        {{ .Content }}

        <div class="hide-on-print">
            <h2>Blog</h2>
            <ul class="project-list blog-cards" role="list">
                {{ range $i, $p := first 3 (where .Site.RegularPages "Section" "blog") }}
                    <li class="project-entry{{ if eq $i 2 }} blog-card-extra{{ end }}">
                        <h3 class="entry-title"><a href="{{ $p.RelPermalink }}">{{ $p.LinkTitle }}</a></h3>
                        <span class="entry-meta"><span class="meta-item">{{ $p.Date | time.Format ":date_long" }}</span></span>
                        {{ with $p.Description }}<p class="entry-summary">{{ . }}</p>{{ end }}
                    </li>
                {{ end }}
                <li class="project-entry blog-cta">
                    <a href="{{ (site.GetPage "blog/_index.md").Permalink }}">{{ T "blogReadAll" }} <span aria-hidden="true">&rarr;</span></a>
                </li>
            </ul>
        </div>
    </article>
{{ end }}
