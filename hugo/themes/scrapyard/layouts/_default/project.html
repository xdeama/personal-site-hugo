{{ define "main" }}
<article class="wrapper region prose flow">

    {{ partial "heading.html" . }}

    <h3><strong>{{ .Params.daterange | markdownify }}</strong> | {{ .Params.role }}</h3>
    <p><em>{{ .Params.company }}</em></p>

    {{ partial "project-tags.html" (dict "page" . "labels" true) }}

    {{ .Content }}

    {{ partial "tech-list.html" . }}

    <div>
        <a href="{{ .CurrentSection.RelPermalink }}">{{ T "backToProjects" }}</a>
    </div>

</article>
{{ end }}
