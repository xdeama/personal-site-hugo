<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
    <head>
        {{ partial "head.html" . }}
        {{ partial "robots.html" . }}
    </head>
    <body>
        <div class="site-bar-wrapper">
            <header role="banner" class="site-bar">
                {{ partial "nav-topbar.html" . }}
            </header>
            <div class="site-drawer" id="site-nav-panel">
                {{ partial "site-nav-vertical.html" . }}
            </div>
        </div>
        <main>
            {{ block "main" . }}{{ end }}
        </main>

        <footer>
            {{ partial "footer.html" . }}
        </footer>

        {{ partial "javascript.html" . }}
    </body>
</html>
