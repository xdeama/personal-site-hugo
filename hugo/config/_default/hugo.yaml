baseURL: https://dmalo.de
theme: scrapyard

title: Denis Malolepszy Software Engineering

defaultContentLanguage: en
defaultContentLanguageInSubdir: true
languages:
  de:
    contentDir: content/de
    disabled: false
    languageCode: de-DE
    languageDirection: ltr
    languageName: Deutsch
    weight: 1
  en:
    contentDir: content/en
    disabled: false
    languageCode: en-US
    languageDirection: ltr
    languageName: English
    weight: 2

# Explicit map replaces Hugo's default tags/categories taxonomies,
# so the stray "tags:" front matter in old blog posts stays inert.
taxonomies:
  technology: technologies
  business-area: business-areas

# Term page titles keep the exact term string (e.g. "jOOQ", "deck.gl").
capitalizeListTitles: false

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    noHl: false
    tabWidth: 4

sitemap:
  changeFreq: monthly

params:
  images:
    - /icon.png
